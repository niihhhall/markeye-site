<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Call | Markeye AI Infrastructure</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .booking-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .booking-hero {
            padding-top: var(--space-4xl);
            padding-bottom: var(--space-2xl);
            border-bottom: 1px solid var(--border-color);
        }

        .booking-container {
            flex: 1;
            padding: var(--space-3xl) 0;
            background: var(--bg-main);
            position: relative;
        }

        .booking-wrapper {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            min-height: 700px;
            position: relative;
            z-index: 2;
        }

        .booking-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: var(--space-lg);
        }

        .booking-sidebar {
            display: none;
        }

        @media (min-width: 1024px) {
            .booking-layout {
                display: grid;
                grid-template-columns: 350px 1fr;
                gap: var(--space-4xl);
                align-items: start;
            }

            .booking-sidebar {
                display: block;
                position: sticky;
                top: var(--space-xl);
            }
        }

        .checklist {
            list-style: none;
            margin-top: var(--space-xl);
        }

        .checklist li {
            padding: var(--space-md) 0;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .checklist li .number-accent {
            font-weight: 700;
        }

        /* Cal.com Customization Overrides */
        #my-cal-inline-1on1 {
            border-radius: 0 !important;
        }
    </style>
</head>
<body class="booking-page">
    <div class="noise-overlay"></div>

    <div id="navbar"></div>

    <main class="booking-container">
        <div class="container">
            <div class="section-label">
                <span class="label-num">INFRA</span>
                <span class="mono">SCHEDULING PROTOCOL — Nº <span class="number-accent">01</span></span>
            </div>

            <div class="booking-layout">
                <aside class="booking-sidebar">
                    <h2 class="serif" style="font-size: 3rem; margin-bottom: 1.5rem;">The Discovery <em>Session.</em></h2>
                    <p class="mono" style="color: var(--text-muted); line-height: 1.6;">
                        A 20-minute technical audit to determine if your operations are ready for AI employee installation.
                    </p>
                    
                    <ul class="checklist">
                        <li>
                            <span class="number-accent">01</span>
                            <span>Infrastructure Audit</span>
                        </li>
                        <li>
                            <span class="number-accent">02</span>
                            <span>Task Mapping</span>
                        </li>
                        <li>
                            <span class="number-accent">03</span>
                            <span>ROI Projection</span>
                        </li>
                    </ul>

                    <div style="margin-top: var(--space-4xl); border-top: 1px solid var(--border-color); padding-top: var(--space-lg);">
                        <div class="mono" style="font-size: 0.6rem; color: var(--text-muted);">CURRENT STATUS</div>
                        <div class="mono" style="color: var(--accent); font-weight: 700;">SYSTEM ONLINE // AVAILABLE</div>
                    </div>
                </aside>

                <div class="booking-wrapper">
                    <!-- Cal inline embed code begins -->
                    <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline-1on1"></div>
                    <script type="text/javascript">
                      (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
                    Cal("init", "1on1", {origin:"https://app.cal.com"});

                      Cal.ns["1on1"]("inline", {
                        elementOrSelector:"#my-cal-inline-1on1",
                        config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
                        calLink: "niihhhall/1on1",
                      });

                      Cal.ns["1on1"]("ui", {"cssVarsPerTheme":{"light":{"cal-brand":"#D90429"},"dark":{"cal-brand":"#ff0000"}},"hideEventTypeDetails":false,"layout":"month_view"});
                      </script>
                      <!-- Cal inline embed code ends -->
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        async function loadSection(id, file) {
            try {
                const response = await fetch(`sections/${file}`);
                const content = await response.text();
                const container = document.getElementById(id);
                if (!container) return;
                
                const temp = document.createElement('div');
                temp.innerHTML = content;
                
                // Styles
                const styles = temp.querySelectorAll('style');
                styles.forEach(style => {
                    const styleId = `style-${file.replace('.html', '')}`;
                    if (!document.getElementById(styleId)) {
                        const newStyle = document.createElement('style');
                        newStyle.id = styleId;
                        newStyle.textContent = style.textContent;
                        document.head.appendChild(newStyle);
                    }
                    style.remove();
                });
                
                // Scripts
                const scripts = temp.querySelectorAll('script');
                container.innerHTML = temp.innerHTML;
                
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                    script.remove();
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function init() {
            await Promise.all([
                loadSection('navbar', 'navbar.html'),
                loadSection('footer', 'footer.html')
            ]);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
