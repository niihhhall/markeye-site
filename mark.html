<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta -->
    <title>Mark by Markeye | 24/7 AI Sales Agent</title>
    <meta name="description" content="Mark is an AI Sales Agent that lives on WhatsApp — qualifying leads, booking discovery calls, and following up 24/7.">
    
    <!-- Design System -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/mark.css">
</head>
<body>
    <!-- Global Noise Texture -->
    <div class="noise-overlay"></div>

    <!-- Sections Placeholder -->
    <div id="navbar"></div>
    
    <main id="mark-content">
        <div id="mark-hero"></div>
        <div id="mark-problem"></div>
        <div id="mark-process"></div>
        <div id="mark-beta"></div>
    </main>

    <div id="footer"></div>

    <!-- Modular Loader Script -->
    <script>
        async function loadSection(id, file) {
            try {
                const response = await fetch(`sections/${file}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const content = await response.text();
                const container = document.getElementById(id);
                if (!container) return;

                const temp = document.createElement('div');
                temp.innerHTML = content;
                
                const styles = temp.querySelectorAll('style');
                styles.forEach(style => {
                    const styleId = `style-${file.replace('.html', '')}`;
                    if (!document.getElementById(styleId)) {
                        const newStyle = document.createElement('style');
                        newStyle.id = styleId;
                        newStyle.textContent = style.textContent;
                        document.head.appendChild(newStyle);
                    }
                    style.remove();
                });
                
                const scripts = temp.querySelectorAll('script');
                container.innerHTML = temp.innerHTML;
                
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                    script.remove();
                });
            } catch (e) {
                console.error(`Failed to load section ${id}: `, e);
            }
        }

        async function initApp() {
            const sections = [
                { id: 'navbar', file: 'navbar.html' },
                { id: 'mark-hero', file: 'mark-hero.html' },
                { id: 'mark-problem', file: 'mark-problem.html' },
                { id: 'mark-process', file: 'mark-process.html' },
                { id: 'mark-beta', file: 'mark-beta.html' },
                { id: 'footer', file: 'footer.html' }
            ];

            await Promise.all(sections.map(section => loadSection(section.id, section.file)));
            initAnimations();
        }

        function initAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        const delay = entry.target.getAttribute('data-delay');
                        if (delay) {
                            entry.target.style.transitionDelay = `${delay}s`;
                        }
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
