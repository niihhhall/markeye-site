<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta -->
    <title>Markeye | The AI Infrastructure</title>
    <meta name="description" content="Markeye installs a done-for-you AI employee team that runs your pipeline, content, and ops — fully trained on your business. Predictable growth. Systematic outbound.">
    
    <!-- Open Graph (LinkedIn + Twitter card) -->
    <meta property="og:title" content="Stop Hiring. Start Installing. | Markeye AI Employees">
    <meta property="og:description" content="We build AI employees trained on your business. They research, outreach, qualify, and book — you watch it happen on one dashboard. Predictable, scalable outbound systems.">
    <meta property="og:image" content="https://markeye.space/og-image.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Markeye — AI Employee Infrastructure">
    <meta name="twitter:description" content="Done-for-you AI employee team. Fully trained on your business. Predictable, scalable outbound systems.">
    <link rel="canonical" href="https://markeye.space">
    <link rel="icon" type="image/jpeg" href="assets/favicon.jpg">
    
    <!-- Design System -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="dark-theme">
    
    <!-- Sections Placeholder -->
    <div id="navbar"></div>
    <main>
        <div id="hero"></div>
        <div id="reframe"></div>
        <div id="services"></div>
        <div id="how-it-works"></div>

        <div id="comparison"></div>
        <div id="who-is-it-for"></div>
        <div id="about"></div>
        <div id="faqs"></div>
        <div id="final-cta"></div>
    </main>
    <div id="footer"></div>

    <!-- Modular Loader Script -->
    <script type="module">
        import { injectSpeedInsights } from '@vercel/speed-insights';
        import { inject as injectAnalytics } from '@vercel/analytics';
        
        injectSpeedInsights();
        injectAnalytics();

        async function loadSection(id, file) {
            try {
                const response = await fetch(`sections/${file}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const content = await response.text();
                const container = document.getElementById(id);
                const temp = document.createElement('div');
                temp.innerHTML = content;
                
                // Handle Styles
                const styles = temp.querySelectorAll('style');
                styles.forEach(style => {
                    const newStyle = document.createElement('style');
                    newStyle.textContent = style.textContent;
                    document.head.appendChild(newStyle);
                    style.remove();
                });
                
                // 3. Handle Scripts (Execute after HTML is in DOM)
                const scripts = temp.querySelectorAll('script');
                
                // Insert HTML content
                container.innerHTML = temp.innerHTML;
                
                // Execute scripts by appending to body
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                    script.remove();
                });
            } catch (e) {
                console.error(`Failed to load section ${id}: `, e);
            }
        }

        async function initApp() {
            // Load sections in sequence to maintain visual order (Funnel-optimized Order)
            const sections = [
                { id: 'navbar', file: 'navbar.html' },
                { id: 'hero', file: 'hero.html' },
                { id: 'reframe', file: 'reframe.html' },
                { id: 'services', file: 'services.html' },
                { id: 'how-it-works', file: 'how-it-works.html' },

                { id: 'comparison', file: 'comparison.html' },
                { id: 'who-is-it-for', file: 'who-is-it-for.html' },
                { id: 'about', file: 'about.html' },
                { id: 'faqs', file: 'faqs.html' },
                { id: 'final-cta', file: 'final-cta.html' },
                { id: 'footer', file: 'footer.html' }
            ];

            for (const section of sections) {
                await loadSection(section.id, section.file);
            }

            // Initialize Animations after content is loaded
            initAnimations();
        }

        function initAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        
                        // Handle staggered delays if defined in data-delay
                        const delay = entry.target.getAttribute('data-delay');
                        if (delay) {
                            entry.target.style.transitionDelay = `${delay}s`;
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        // Start loading
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
