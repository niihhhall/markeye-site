<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta -->
    <title>Markeye | The AI Infrastructure</title>
    <meta name="description" content="Markeye installs a done-for-you AI employee team that runs your pipeline, content, and ops — fully trained on your business. Predictable growth. Systematic outbound.">
    
    <!-- Open Graph (LinkedIn + Twitter card) -->
    <meta property="og:title" content="Stop Hiring. Start Installing. | Markeye AI Employees">
    <meta property="og:description" content="We build AI employees trained on your business. They research, outreach, qualify, and book — you watch it happen on one dashboard. Predictable, scalable outbound systems.">
    <meta property="og:image" content="https://markeye.space/og-image.png">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Markeye — AI Employee Infrastructure">
    <meta name="twitter:description" content="Done-for-you AI employee team. Fully trained on your business. Predictable, scalable outbound systems.">
    <link rel="canonical" href="https://markeye.space">
    <link rel="icon" type="image/jpeg" href="assets/favicon.jpg">
    <link rel="shortcut icon" href="assets/favicon.jpg">
    <link rel="apple-touch-icon" href="assets/favicon.jpg">
    
    <!-- Design System -->
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Performance Optimization: Preconnect & Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="css/main.css" as="style">
</head>
<body>
    <!-- Initial Loading State -->
    <div id="app-loader" style="position: fixed; inset: 0; background: var(--bg-main, #000); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease;">
        <div style="font-family: var(--font-mono, monospace); font-size: 0.8rem; color: var(--accent, #ff3b30); letter-spacing: 0.2em; text-transform: uppercase;">
            Initializing Infrastructure...
        </div>
    </div>

    <!-- Global Noise Texture -->
    <div class="noise-overlay"></div>
    
    <!-- Sections Placeholder -->
    <div id="navbar"></div>
    <main>
        <div id="hero"></div>
        <div id="stats"></div>
        <div id="about"></div>
        <div id="services"></div>
        <div id="how-it-works"></div>
        <div id="reframe"></div>
        <div id="final-cta"></div>
    </main>
    <div id="footer"></div>

    <!-- Modular Loader Script -->
    <script>
        async function loadSection(id, file) {
            try {
                const response = await fetch(`sections/${file}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const content = await response.text();
                const container = document.getElementById(id);
                if (!container) return;

                const temp = document.createElement('div');
                temp.innerHTML = content;
                
                // Handle Styles (prevent duplicates)
                const styles = temp.querySelectorAll('style');
                styles.forEach(style => {
                    const styleId = `style-${file.replace('.html', '')}`;
                    if (!document.getElementById(styleId)) {
                        const newStyle = document.createElement('style');
                        newStyle.id = styleId;
                        newStyle.textContent = style.textContent;
                        document.head.appendChild(newStyle);
                    }
                    style.remove();
                });
                
                // Handle Scripts
                const scripts = temp.querySelectorAll('script');
                container.innerHTML = temp.innerHTML;
                
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                    script.remove();
                });
            } catch (e) {
                console.error(`Failed to load section ${id}: `, e);
            }
        }

        async function initApp() {
            const sections = [
                { id: 'navbar', file: 'navbar.html' },
                { id: 'hero', file: 'hero.html' },
                { id: 'stats', file: 'stats.html' },
                { id: 'about', file: 'about.html' },
                { id: 'services', file: 'services.html' },
                { id: 'how-it-works', file: 'how-it-works.html' },
                { id: 'reframe', file: 'reframe.html' },
                { id: 'final-cta', file: 'final-cta.html' },
                { id: 'footer', file: 'footer.html' }
            ];

            // PARALLEL LOADING: Fetch all sections simultaneously
            try {
                await Promise.all(sections.map(section => loadSection(section.id, section.file)));
                
                // Remove loader
                const loader = document.getElementById('app-loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }

                initAnimations();
            } catch (error) {
                console.error("Infrastructure initialization failed:", error);
            }
        }

        function initAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        const delay = entry.target.getAttribute('data-delay');
                        if (delay) {
                            entry.target.style.transitionDelay = `${delay}s`;
                        }
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>

</body>
</html>

</html>
