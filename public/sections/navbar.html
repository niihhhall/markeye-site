<style>
.site-header {
    width: 100%;
    background: var(--bg-main);
    z-index: 1000;
    position: fixed;
    top: 0;
    left: 0;
}

.nav-container {
    max-width: var(--container-width);
    margin: 0 auto;
    padding: 0 var(--container-padding);
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
}

/* --- Top Utility Bar --- */
.nav-utility {
    height: 32px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
}

.nav-utility .nav-container > div {
    flex: auto;
}

.utility-center {
    text-align: center;
}

.utility-right {
    text-align: right;
}

.meta-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
}

.accent-label {
    color: var(--accent);
}

.nav-status {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.nav-pulse-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: navPulse 2s infinite;
    flex-shrink: 0;
}

@keyframes navPulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}

/* --- Main Navbar --- */
.nav-main {
    height: 88px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
}

.nav-main .nav-container > div, 
.nav-main .nav-container > a,
.nav-main .nav-container > ul {
    flex: 1;
}

.nav-main .nav-container .nav-menu {
    justify-content: center;
    flex: 2; /* Give menu more space in the center */
}

.nav-main .nav-container .nav-actions {
    justify-content: flex-end;
}

.logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
}

.logo-glyph {
    font-size: 1.5rem;
    font-weight: 850;
    color: var(--text-primary);
}

.logo-visual-container {
    padding: 2px;
    border: 1px solid var(--border-color);
    background: var(--bg-main);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.logo-img {
    height: 40px; /* Slightly more compact for better alignment */
    width: auto;
    display: block;
    object-fit: contain;
}

.logo:hover .logo-visual-container {
    border-color: var(--accent);
    transform: translateY(-1px);
}

.logo-text-group {
    display: flex;
    flex-direction: column;
}

.logo-brand {
    font-family: var(--font-sans);
    font-weight: 900; /* Heavier for more impact */
    font-size: 1.15rem;
    line-height: 0.9;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: -0.04em; /* Tighter for premium feel */
    transition: color 0.3s ease;
}

.logo:hover .logo-brand {
    color: var(--accent);
}

.logo-meta {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    font-weight: 700;
    color: var(--text-secondary);
    margin-top: 0.25rem;
    letter-spacing: 0.05em;
}

.nav-menu {
    display: flex;
    gap: 4rem; /* Increased gap */
    list-style: none;
}

.nav-menu a {
    text-decoration: none;
    font-family: var(--font-sans);
    font-weight: 750;
    font-size: 0.85rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    transition: color 0.3s ease;
    position: relative;
    white-space: nowrap;
}

.nav-menu a sup {
    font-family: var(--font-mono);
    font-size: 0.5rem;
    font-weight: 700;
    margin-left: 2px;
    color: var(--text-muted);
}

.nav-menu a:hover {
    color: var(--text-primary);
}

/* --- Nav Actions --- */
.nav-actions {
    display: flex;
    align-items: center;
    gap: 1.5rem; /* Increased gap */
}

.btn-nav-ghost {
    padding: 0.7rem 1.5rem; /* Slightly larger */
    border: 1px solid var(--accent);
    border-radius: 99px;
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    transition: all 0.3s ease;
}

.btn-nav-ghost:hover {
    background: var(--accent);
    color: white;
}

.btn-nav-solid {
    padding: 0.7rem 1.5rem; /* Slightly larger */
    background: var(--accent);
    color: white;
    border-radius: 99px;
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    transition: all 0.3s ease;
}

.btn-nav-solid:hover {
    background: var(--text-primary);
    color: white;
    transform: translateY(-1px);
}

.mobile-toggle {
    display: none;
    flex-direction: column;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
}

.mobile-toggle span {
    width: 24px;
    height: 1.5px;
    background: var(--text-primary);
}

@media (max-width: 1024px) {
    .nav-container { padding: 0 var(--container-padding); }
    .nav-menu, .utility-center { display: none; }
    .mobile-toggle { display: flex; }
    .nav-main { height: 72px; }
    .btn-nav-ghost { display: none; }

    .nav-utility .nav-container {
        justify-content: space-between;
    }

    .utility-left .meta-label span:not(.number-accent) {
        display: none; /* Hide 'VOL.' and 'ISSUE Nº' on mobile to save space */
    }

    .nav-status .meta-label {
        white-space: nowrap;
    }

    /* Mobile Menu Dropdown */
    .site-header.is-open .nav-menu {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 104px;
        left: 0;
        width: 100%;
        height: calc(100vh - 104px);
        background: var(--bg-main);
        padding: var(--space-2xl) var(--container-padding);
        border-bottom: 1px solid var(--border-color);
        gap: var(--space-xl);
        z-index: 100;
        overflow-y: auto;
    }

    .site-header.is-open .nav-menu a {
        font-family: var(--font-serif);
        font-size: var(--font-size-2xl);
        width: 100%;
        display: block;
        color: var(--text-primary);
    }
}

@media (max-width: 480px) {
    .utility-left {
        display: none; /* Only show status on very small screens */
    }
    .nav-utility .nav-container {
        justify-content: center;
    }
}

</style>

<script>
(function() {
    const initNavbar = () => {
        const header = document.querySelector('.site-header');
        const toggle = document.querySelector('.mobile-toggle');
        
        if (!toggle) return;

        toggle.addEventListener('click', () => {
            header.classList.toggle('is-open');
            document.body.classList.toggle('menu-open');
        });
    };

    setTimeout(initNavbar, 100);
})();
</script>
