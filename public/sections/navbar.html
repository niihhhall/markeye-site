<script>
// Mobile Menu Controller
(function() {
    const initMobileMenu = () => {
        const nav = document.querySelector('.navbar-container');
        const toggle = document.querySelector('.mobile-toggle');
        const links = document.querySelectorAll('.nav-links a');

        if (!toggle || !nav) {
            console.warn('Mobile menu elements not found, retrying...');
            setTimeout(initMobileMenu, 100);
            return;
        }

        console.log('Mobile menu initialized');

        toggle.onclick = (e) => {
            e.preventDefault();
            console.log('Toggle clicked');
            nav.classList.toggle('is-active');
            document.body.style.overflow = nav.classList.contains('is-active') ? 'hidden' : '';
        };

        // Close menu when a link is clicked
        links.forEach(link => {
            link.onclick = () => {
                nav.classList.remove('is-active');
                document.body.style.overflow = '';
            };
        });
    };

    // Execute with a small delay to ensure DOM is ready after injection
    setTimeout(initMobileMenu, 50);
})();
(function() {
    const canvas = document.getElementById('navbar-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;
    let mouse = { x: null, y: null };

    const settings = {
        count: window.innerWidth < 768 ? 15 : 25,
        distance: 100,
        particleSpeed: 0.3,
        particleRadius: 1,
        connectionWidth: 0.4,
        mouseRadius: 150
    };

    class Particle {
        constructor() {
            this.init();
        }

        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * settings.particleSpeed;
            this.vy = (Math.random() - 0.5) * settings.particleSpeed;
            this.radius = Math.random() * settings.particleRadius + 0.3;
            this.alpha = Math.random() * 0.3 + 0.1;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

            if (mouse.x !== null) {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < settings.mouseRadius) {
                    const force = (settings.mouseRadius - dist) / settings.mouseRadius;
                    this.vx -= dx * force * 0.003;
                    this.vy -= dy * force * 0.003;
                }
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            ctx.fill();
        }
    }

    function init() {
        resize();
        particles = [];
        for (let i = 0; i < settings.count; i++) {
            particles.push(new Particle());
        }
    }

    function resize() {
        if (!canvas.parentElement) return;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i];
            p1.update();
            p1.draw();

            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < settings.distance) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    const alpha = (1 - dist / settings.distance) * 0.1;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = settings.connectionWidth;
                    ctx.stroke();
                }
            }
        }
        animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    init();
    animate();
})();

(function() {
    const canvas = document.getElementById('button-canvas');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;

    const settings = {
        count: 15,
        particleSpeed: 0.8,
        particleRadius: 1.2,
        connectionWidth: 0.5,
        color: 'rgba(255, 255, 255, 0.4)'
    };

    class Particle {
        constructor() {
            this.init();
        }

        init() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * settings.particleSpeed;
            this.vy = (Math.random() - 0.5) * settings.particleSpeed;
            this.radius = Math.random() * settings.particleRadius + 0.5;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = settings.color;
            ctx.fill();
        }
    }

    function init() {
        resize();
        particles = [];
        for (let i = 0; i < settings.count; i++) {
            particles.push(new Particle());
        }
    }

    function resize() {
        if (!canvas.parentElement) return;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i];
            p1.update();
            p1.draw();

            for (let j = i + 1; j < particles.length; j++) {
                const p2 = particles[j];
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 40) {
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    const alpha = (1 - dist / 40) * 0.3;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.lineWidth = settings.connectionWidth;
                    ctx.stroke();
                }
            }
        }
        animationId = requestAnimationFrame(animate);
    }

    window.addEventListener('resize', init);
    
    // Trigger resize on mouseenter to ensure canvas is correct
    canvas.parentElement.addEventListener('mouseenter', init);

    init();
    animate();
})();
