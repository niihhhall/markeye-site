<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Markeye AI Infrastructure</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        :root {
            --contact-max-width: 1000px;
            --terminal-border: 1px solid var(--border-color);
        }

        .contact-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-main);
        }

        .contact-hero {
            padding: var(--space-4xl) 0;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        /* --- Frame Layout --- */
        .terminal-container {
            max-width: var(--contact-max-width);
            margin: 0 auto;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            padding: 0 var(--space-xl);
            position: relative;
        }

        .terminal-header-block {
            padding: var(--space-2xl) 0;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            position: relative;
        }

        .terminal-header-block h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.85;
            text-transform: uppercase;
            margin: var(--space-md) 0;
        }

        .terminal-header-block .protocol-label {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 0.6rem;
            border-radius: 99px;
        }

        /* --- Scheduling Module --- */
        .scheduling-module {
            padding: var(--space-3xl) 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cal-wrapper {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            position: relative;
            min-height: 700px;
            box-shadow: 20px 20px 0px rgba(217, 4, 41, 0.03);
            transition: all 0.6s var(--ease-out-expo);
        }

        .cal-wrapper:hover {
            box-shadow: 30px 30px 0px rgba(217, 4, 41, 0.05);
            transform: translate(-5px, -5px);
        }

        .cal-wrapper::before {
            content: 'TERMINAL_01 // ACTIVE_SYNC';
            position: absolute;
            top: -12px;
            left: var(--space-md);
            background: var(--bg-main);
            padding: 0 10px;
            font-family: var(--font-mono);
            font-size: 0.55rem;
            color: var(--text-muted);
            z-index: 10;
        }

        /* --- Meta Data Grid --- */
        .contact-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--border-color);
        }

        .meta-module {
            padding: var(--space-2xl);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }

        .meta-module:first-child {
            border-right: 1px solid var(--border-color);
        }

        .meta-module h3 {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .meta-module p {
            font-size: 1.1rem;
            line-height: 1.4;
            color: var(--text-primary);
        }

        .meta-module .sub-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* --- Decorative Details --- */
        .corner-accent {
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid var(--accent);
            z-index: 5;
        }

        .corner-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .corner-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .corner-br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        @media (max-width: 768px) {
            .contact-meta-grid {
                grid-template-columns: 1fr;
            }
            .meta-module:first-child {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            .terminal-container {
                border-left: none;
                border-right: none;
            }
        }
    </style>
</head>
<body>
    <div class="noise-overlay"></div>
    <div id="navbar"></div>

    <main class="contact-page">
        <section class="contact-hero">
            <div class="terminal-container">
                <!-- Corner Accents -->
                <div class="corner-accent corner-tl"></div>
                <div class="corner-accent corner-tr"></div>
                <div class="corner-accent corner-bl"></div>
                <div class="corner-accent corner-br"></div>

                <!-- Header Block -->
                <header class="terminal-header-block reveal">
                    <div class="protocol-label mono">INITIATE_SCHEDULING_PROTOCOL</div>
                    <h1 class="serif">Secure your <span class="accent-dot">Discovery Session.</span></h1>
                    <div class="sub-label mono" style="color: var(--text-muted);">LOC // NEW_DELHI // IND · TIME // UTC+5.5</div>
                </header>

                <!-- Scheduling Section -->
                <div class="scheduling-module reveal" data-delay="0.2">
                    <div class="cal-wrapper">
                        <!-- Cal inline embed code begins -->
                        <div style="width:100%;height:100%;overflow:scroll" id="my-cal-inline-1on1"></div>
                        <script type="text/javascript">
                          (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
                        Cal("init", "1on1", {origin:"https://app.cal.com"});

                          Cal.ns["1on1"]("inline", {
                            elementOrSelector:"#my-cal-inline-1on1",
                            config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
                            calLink: "niihhhall/1on1",
                          });

                          Cal.ns["1on1"]("ui", {"cssVarsPerTheme":{"light":{"cal-brand":"#ff3b30"},"dark":{"cal-brand":"#ff3b30"}},"hideEventTypeDetails":false,"layout":"month_view"});
                        </script>
                        <!-- Cal inline embed code ends -->
                    </div>
                </div>

                <!-- Meta Modules -->
                <div class="contact-meta-grid reveal" data-delay="0.4">
                    <div class="meta-module">
                        <span class="sub-label">01 // ELECTRONIC_MAIL</span>
                        <h3>Direct_Link</h3>
                        <p class="serif" style="font-size: 1.5rem;">hello@markeye.ai</p>
                    </div>
                    <div class="meta-module">
                        <span class="sub-label">02 // GEOGRAPHIC_LOC</span>
                        <h3>Global_HQ</h3>
                        <p class="serif" style="font-size: 1.5rem;">New Delhi, India / Earth</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script>
        // Modular loading logic for navbar/footer
        async function loadSection(id, file) {
            try {
                const response = await fetch(`sections/${file}`);
                const content = await response.text();
                const container = document.getElementById(id);
                if (!container) return;
                
                const temp = document.createElement('div');
                temp.innerHTML = content;
                
                // Styles
                const styles = temp.querySelectorAll('style');
                styles.forEach(style => {
                    const styleId = `style-${file.replace('.html', '')}`;
                    if (!document.getElementById(styleId)) {
                        const newStyle = document.createElement('style');
                        newStyle.id = styleId;
                        newStyle.textContent = style.textContent;
                        document.head.appendChild(newStyle);
                    }
                    style.remove();
                });
                
                // Scripts
                const scripts = temp.querySelectorAll('script');
                container.innerHTML = temp.innerHTML;
                
                scripts.forEach(script => {
                    const newScript = document.createElement('script');
                    newScript.textContent = script.textContent;
                    document.body.appendChild(newScript);
                    script.remove();
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function init() {
            await Promise.all([
                loadSection('navbar', 'navbar.html'),
                loadSection('footer', 'footer.html')
            ]);
            initAnimations();
        }

        function initAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
